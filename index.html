<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 工具箱</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>

    <div class="container">
        <div class="page-tabs" role="tablist" aria-label="QR 工具模式切換">
            <button class="tab-button is-active" id="generator-tab" data-tab="generator" aria-selected="true">產生 QR Code</button>
            <button class="tab-button" id="parser-tab" data-tab="parser" aria-selected="false">解析 QR / 條碼</button>
        </div>

        <section id="generator-panel" class="panel is-active" aria-labelledby="generator-tab">
            <h1>安全的 QR Code 工具箱</h1>
            <p class="panel-intro">輸入文字即可產生 QR Code；切到解析頁籤則可用圖片、拖放、貼上或鏡頭讀取。</p>

            <label for="text-input">請在此輸入您要傳輸的資料：</label>
            <textarea id="text-input" placeholder="貼上您的文字、網址或任何資料..."></textarea>

            <div class="buttons">
                <button id="generateBtn" class="button-primary grow">產生 QR Code</button>
                <button id="clearBtn" class="button-secondary grow">清除內容</button>
            </div>

            <div id="qrcode-container" class="visual-output"></div>
        </section>

        <section id="parser-panel" class="panel" aria-labelledby="parser-tab" hidden>
            <h1>安全的 QR / 條碼解析器</h1>
            <p class="panel-intro">支援選圖、拖曳圖片，以及手動啟動鏡頭即時解析。</p>

            <div class="method-card">
                <h2>圖片與鏡頭解析</h2>
                <p>可直接選圖、把圖片拖進框內，或切換成鏡頭掃描模式。</p>

                <div id="dropZone" class="drop-zone" tabindex="0" aria-label="圖片拖放與選檔區">
                    <input id="imageInput" type="file" accept="image/*" hidden>

                    <div id="dropZoneContent" class="drop-zone-content">
                        <p class="drop-zone-title">把圖片拖曳到這裡</p>
                        <p class="drop-zone-subtitle">也可以按按鈕選擇圖片檔案</p>

                        <div class="action-row">
                            <button id="pickImageBtn" class="button-primary" type="button">選擇圖片</button>
                            <button id="startCameraBtn" class="button-secondary" type="button">使用鏡頭</button>
                        </div>
                    </div>

                    <div id="cameraPanel" class="camera-panel" hidden>
                        <div class="camera-toolbar">
                            <label id="cameraSelectWrap" class="camera-select-wrap" hidden>
                                <span>鏡頭</span>
                                <select id="cameraSelect" class="camera-select" aria-label="選擇鏡頭"></select>
                            </label>
                            <button id="stopCameraBtn" class="button-secondary" type="button" disabled>停止鏡頭</button>
                        </div>

                        <p id="cameraStatus" class="camera-status">尚未啟動鏡頭。</p>

                        <div id="camera-reader" class="camera-reader">
                            <p class="camera-placeholder">鏡頭畫面會顯示在這裡</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-header">
                    <h2>解析結果</h2>
                    <button id="copyResultBtn" class="button-ghost" type="button" disabled>複製結果</button>
                </div>

                <p id="parseStatus" class="parse-status" data-tone="warning">請先選擇圖片、拖曳圖片，或手動啟動鏡頭開始解析。</p>

                <div id="resultMeta" class="result-meta" hidden>
                    <span>來源：<strong id="resultSource">-</strong></span>
                    <span>格式：<strong id="resultFormat">-</strong></span>
                </div>

                <pre id="decodedText" class="decoded-text">尚無資料</pre>
            </div>

            <div id="file-decoder" class="decoder-sandbox" aria-hidden="true"></div>
        </section>
    </div>

    <script src="./html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script type="module" src="./index.js"></script>

</body>

</html>
